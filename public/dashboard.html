<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #f5f5f5;
            overflow-x: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .profile-avatar:hover {
            opacity: 0.8;
        }
        .stat-card {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #667eea;
            font-weight: bold;
            margin: 10px 0 0;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .post-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .post-item:hover { transform: translateY(-5px); }
        .post-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .post-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
            display: block;
        }
        .post-info {
            padding: 12px;
        }
        .settings-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .dashboard-shell {
            padding-left: 16px;
            padding-right: 16px;
        }

        .section-header {
            gap: 12px;
        }

        /* Dashboard-local People Present styles (kept local to avoid stale CSS cache issues) */
        #peoplePresentPanel {
            position: fixed;
            top: 88px;
            right: 16px;
            width: 320px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
            z-index: 1100;
            overflow: hidden;
        }

        .presence-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #edf0f4;
            background: linear-gradient(90deg, #f8faff 0%, #ffffff 100%);
        }

        .presence-title {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .presence-title strong {
            font-size: 14px;
            color: #111827;
        }

        .presence-title small {
            color: #6b7280;
            font-size: 12px;
        }

        .presence-title small.is-updated {
            color: #16a34a;
        }

        .presence-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .presence-pill {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 999px;
        }

        .presence-refresh {
            border: 1px solid #dbe1ea;
            background: #fff;
            border-radius: 8px;
            font-size: 12px;
            padding: 3px 8px;
            color: #374151;
            cursor: pointer;
        }

        .presence-toggle-btn {
            border: 1px solid #dbe1ea;
            background: #fff;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1;
            padding: 5px 9px;
            color: #374151;
            cursor: pointer;
        }

        .presence-controls {
            padding: 10px 12px;
            border-bottom: 1px solid #edf0f4;
            display: grid;
            gap: 8px;
        }

        .presence-search {
            width: 100%;
            border: 1px solid #dbe1ea;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 13px;
        }

        .presence-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #4b5563;
            user-select: none;
        }

        #peoplePresentList {
            max-height: 360px;
            overflow-y: auto;
            padding: 8px;
        }

        .presence-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            text-decoration: none;
            color: #111827;
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        .presence-user:hover {
            background: #f8fafc;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .presence-avatar-wrap {
            width: 40px;
            height: 40px;
            position: relative;
            flex: 0 0 40px;
        }

        .presence-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 1px solid #e5e7eb;
        }

        .presence-avatar-fallback {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: 1px solid #e5e7eb;
        }

        .presence-dot {
            position: absolute;
            right: 1px;
            bottom: 1px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .presence-dot.online { background: #22c55e; }
        .presence-dot.away { background: #f59e0b; }

        .presence-meta {
            min-width: 0;
        }

        .presence-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .presence-sub {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .presence-empty {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
            padding: 12px;
        }

        #peoplePresentPanel.is-collapsed .presence-controls,
        #peoplePresentPanel.is-collapsed #peoplePresentList {
            display: none;
        }

        #peoplePresentPanel.is-collapsed {
            width: 230px;
        }

        @media (max-width: 992px) {
            #peoplePresentPanel {
                position: static;
                width: auto;
                margin: 12px;
            }

            .profile-header {
                padding: 32px 0;
            }

            .posts-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            nav.instagram-navbar > .container-fluid {
                padding-left: 14px !important;
                padding-right: 14px !important;
            }

            .dashboard-shell {
                margin-top: 2rem !important;
                margin-bottom: 2rem !important;
                padding-left: 14px;
                padding-right: 14px;
            }

            .profile-header {
                padding: 28px 0;
                margin-bottom: 24px;
            }

            .profile-avatar {
                width: 96px;
                height: 96px;
            }

            #userName {
                font-size: 1.75rem;
            }

            #userEmail,
            #userBio {
                font-size: 1rem !important;
            }

            .stat-card,
            .settings-section {
                padding: 16px;
            }

            .posts-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .post-item img,
            .post-item video {
                height: 170px;
            }

            .section-header {
                flex-direction: column;
                align-items: stretch !important;
            }

            .section-header .btn {
                width: 100%;
            }

            #peoplePresentPanel {
                margin: 0 0 16px;
                width: 100%;
            }
        }

        @media (max-width: 576px) {
            .dashboard-shell {
                padding-left: 12px;
                padding-right: 12px;
            }

            .profile-header .row {
                text-align: center;
            }

            .profile-avatar {
                width: 82px;
                height: 82px;
            }

            #userName {
                font-size: 1.45rem;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            .post-item img,
            .post-item video {
                height: 220px;
            }

            .presence-header {
                align-items: flex-start;
                gap: 8px;
            }

            .presence-actions {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .presence-controls {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="instagram-navbar">
        <div class="container-fluid d-flex align-items-center justify-content-between" style="padding: 0 20px;">
            <a href="consumer-feed.html" style="text-decoration: none; color: inherit; margin: 0;"><strong>InstaShare</strong></a>
            <div class="navbar-right">
                <a href="consumer-feed.html" class="nav-icon" title="Home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                </a>
                <!-- Profile Avatar (current page — no link needed) -->
                <span class="nav-icon" style="padding: 0;">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Profile" class="user-avatar" id="profileDropdown" style="cursor: default;">
                </span>

                <!-- Logout -->
                <button class="nav-icon" title="Logout" onclick="runLogout()" style="border: none; background: none; cursor: pointer;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-5 dashboard-shell">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-3 text-center mb-4 mb-md-0">
                        <img id="userAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Avatar" class="profile-avatar" onclick="document.getElementById('avatarInput').click()" title="Click to change avatar">
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </div>
                    <div class="col-md-9">
                        <h1 id="userName">Loading...</h1>
                        <p id="userEmail" class="fs-5">Loading...</p>
                        <p id="userBio">Welcome to InstaShare!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="row mb-5">
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-images" style="font-size: 24px;"></i>
                    <p>Posts</p>
                    <h3 id="postCount">0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-heart" style="font-size: 24px;"></i>
                    <p>Likes</p>
                    <h3 id="likeCount">0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-chat" style="font-size: 24px;"></i>
                    <p>Comments</p>
                    <h3 id="commentCount">0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-star" style="font-size: 24px;"></i>
                    <p>Rating</p>
                    <h3 id="avgRating">0.0</h3>
                </div>
            </div>
        </div>

        <!-- Posts Section -->
        <div class="mb-5">
            <div class="d-flex justify-content-between align-items-center mb-3 section-header">
                <h3>Your Posts</h3>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    <i class="bi bi-plus"></i> New Post
                </button>
            </div>
            <div id="postsContainer" class="posts-grid">
                <p class="text-muted">Loading posts...</p>
            </div>
        </div>

        <!-- Settings Section -->
        <div class="settings-section">
            <h3>Profile Settings</h3>
            <form id="profileForm">
                <div class="mb-3">
                    <label class="form-label">Display Name</label>
                    <input type="text" class="form-control" id="displayName" placeholder="Your name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <textarea class="form-control" id="bioText" rows="3" maxlength="500"></textarea>
                    <small><span id="bioCount">0</span>/500</small>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <div id="preview" style="display:none; margin-bottom: 15px;">
                                <img id="imgPreview" style="max-width: 100%; max-height: 300px; border-radius: 8px; display: none;">
                                <video id="vidPreview" style="max-width: 100%; max-height: 300px; border-radius: 8px; display: none;" controls></video>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Photo or Video</label>
                            <input type="file" class="form-control" id="mediaFile" accept="image/*,video/*" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="postTitle" placeholder="Post title" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Caption</label>
                            <textarea class="form-control" id="postCaption" placeholder="Write a caption..." rows="3" maxlength="2000"></textarea>
                            <small><span id="captionLen">0</span>/2000</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location (Optional)</label>
                            <input type="text" class="form-control" id="postLocation" placeholder="Where was this taken?">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="uploadBtn" onclick="uploadPost()">Post</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import * as api from './assets/js/api.js';
        import { logout, requireAuth, saveUser } from './assets/js/auth.js';

        const { updateMyProfile, uploadMyAvatar } = api;

        window.runLogout = logout;

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function avatarFallback(label) {
            const initial = (String(label || 'U').trim().charAt(0) || 'U').toUpperCase();
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160"><rect width="160" height="160" rx="80" fill="#667eea"/><text x="50%" y="54%" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" fill="#ffffff">${initial}</text></svg>`;
            return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
        }

        function getAvatarUrl(user) {
            return user.avatarUrl || avatarFallback(user.displayName || user.email || 'User');
        }

        function renderPostMedia(post) {
            const mediaUrl = post.url || '';
            if (!mediaUrl) {
                return '<div class="d-flex align-items-center justify-content-center text-muted" style="height: 200px; background: #f0f0f0;">Media unavailable</div>';
            }

            if (post.type === 'video') {
                return `<video src="${mediaUrl}" controls muted playsinline preload="metadata" data-hover-play="true"></video>`;
            }

            return `<img src="${mediaUrl}" alt="${escapeHtml(post.title || 'Post image')}" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=&quot;d-flex align-items-center justify-content-center text-muted&quot; style=&quot;height:200px;background:#f0f0f0;&quot;>Image unavailable</div>')">`;
        }

        function bindHoverPreviewVideo(video) {
            if (!video || video.dataset.hoverBound === '1') {
                return;
            }

            video.dataset.hoverBound = '1';

            video.addEventListener('mouseenter', () => {
                video.play().catch(() => {
                    // Browser autoplay policies may block playback before interaction.
                });
            });

            video.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0;
            });

            video.addEventListener('click', (event) => event.stopPropagation());
            video.addEventListener('dblclick', (event) => event.stopPropagation());
        }

        function applyUserToView(user) {
            const displayName = user.displayName || user.email?.split('@')[0] || 'User';
            const bio = user.bio || 'Welcome to InstaShare!';
            const avatarUrl = getAvatarUrl(user);

            document.getElementById('userName').textContent = displayName;
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userBio').textContent = bio;
            document.getElementById('userAvatar').src = avatarUrl;
            document.getElementById('profileDropdown').src = avatarUrl;
            document.getElementById('displayName').value = user.displayName || '';
            document.getElementById('bioText').value = user.bio || '';
            document.getElementById('bioCount').textContent = (user.bio || '').length;
        }

        function formatPresence(minutesAgo) {
            const value = Number(minutesAgo || 0);
            if (value <= 1) {
                return 'Just now';
            }
            if (value < 60) {
                return `${value}m ago`;
            }

            const hours = Math.floor(value / 60);
            if (hours < 24) {
                return `${hours}h ago`;
            }

            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        let presenceUsers = [];

        function ensurePeoplePresentContainer() {
            let panel = document.getElementById('peoplePresentPanel');
            if (panel) {
                return panel;
            }

            panel = document.createElement('aside');
            panel.id = 'peoplePresentPanel';
            panel.innerHTML = `
                <div class="presence-header">
                    <div class="presence-title">
                        <strong>People Present</strong>
                        <small>Recently active</small>
                    </div>
                    <div class="presence-actions">
                        <span id="peoplePresentCount" class="presence-pill">0 users</span>
                        <button type="button" id="peoplePresentToggle" class="presence-toggle-btn" title="Collapse panel">−</button>
                        <button type="button" id="peoplePresentRefresh" class="presence-refresh">Refresh</button>
                    </div>
                </div>
                <div class="presence-controls">
                    <input id="peoplePresentSearch" class="presence-search" type="text" placeholder="Search people...">
                    <label class="presence-toggle">
                        <input type="checkbox" id="peoplePresentOnlineOnly">
                        Online only
                    </label>
                </div>
                <div id="peoplePresentList">
                    <div class="presence-empty">Loading...</div>
                </div>
            `;

            document.body.appendChild(panel);

            const toggle = panel.querySelector('#peoplePresentOnlineOnly');
            if (toggle) {
                toggle.addEventListener('change', applyPresenceFiltersAndRender);
            }

            const search = panel.querySelector('#peoplePresentSearch');
            if (search) {
                search.addEventListener('input', applyPresenceFiltersAndRender);
            }

            const refresh = panel.querySelector('#peoplePresentRefresh');
            if (refresh) {
                refresh.addEventListener('click', loadPeoplePresent);
            }

            const panelToggle = panel.querySelector('#peoplePresentToggle');
            if (panelToggle) {
                panelToggle.addEventListener('click', () => {
                    panel.classList.toggle('is-collapsed');
                    const collapsed = panel.classList.contains('is-collapsed');
                    panelToggle.textContent = collapsed ? '+' : '−';
                    panelToggle.title = collapsed ? 'Expand panel' : 'Collapse panel';
                });
            }

            return panel;
        }

        function applyPresenceFiltersAndRender() {
            const term = String(document.getElementById('peoplePresentSearch')?.value || '').trim().toLowerCase();
            const onlineOnly = Boolean(document.getElementById('peoplePresentOnlineOnly')?.checked);

            let filtered = [...presenceUsers];

            if (onlineOnly) {
                filtered = filtered.filter((user) => Boolean(user.isActive));
            }

            if (term) {
                filtered = filtered.filter((user) => {
                    const name = String(user.displayName || '').toLowerCase();
                    const email = String(user.email || '').toLowerCase();
                    return name.includes(term) || email.includes(term);
                });
            }

            renderPeoplePresent(filtered);
        }

        function renderPeoplePresent(users) {
            const list = document.getElementById('peoplePresentList');
            const count = document.getElementById('peoplePresentCount');
            if (!list) {
                return;
            }

            if (count) {
                count.textContent = `${users.length} user${users.length === 1 ? '' : 's'}`;
            }

            if (!Array.isArray(users) || users.length === 0) {
                list.innerHTML = '<div class="presence-empty">No matching users</div>';
                return;
            }

            list.innerHTML = users.map((user) => {
                const displayName = escapeHtml(user.displayName || user.email?.split('@')[0] || 'User');
                const role = escapeHtml((user.role || '').toUpperCase());
                const statusClass = user.isActive ? 'online' : 'away';
                const avatar = user.avatarUrl
                    ? `<img class="presence-avatar" src="${escapeHtml(user.avatarUrl)}" alt="${displayName}">`
                    : `<div class="presence-avatar-fallback">${escapeHtml((displayName.charAt(0) || 'U').toUpperCase())}</div>`;

                return `
                    <a class="presence-user" href="/user-profile.html?id=${Number(user.id || 0)}">
                        <div class="presence-avatar-wrap">
                            ${avatar}
                            <span class="presence-dot ${statusClass}"></span>
                        </div>
                        <div class="presence-meta">
                            <div class="presence-name">${displayName}</div>
                            <div class="presence-sub">${role} • ${formatPresence(user.minutesAgo)}</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        async function loadPeoplePresent() {
            const panel = ensurePeoplePresentContainer();
            const refreshButton = document.getElementById('peoplePresentRefresh');
            const subtitle = panel?.querySelector('.presence-title small');

            if (refreshButton) {
                refreshButton.disabled = true;
                refreshButton.textContent = 'Refreshing...';
            }

            if (subtitle) {
                subtitle.textContent = 'Refreshing...';
                subtitle.classList.remove('is-updated');
            }

            try {
                let res;
                if (typeof api.fetchPeoplePresent === 'function') {
                    res = await api.fetchPeoplePresent(10, 24);
                } else {
                    const token = localStorage.getItem('token');
                    const response = await fetch(`/api/users/present?limit=10&hours=24&_ts=${Date.now()}`, {
                        headers: token ? { Authorization: `Bearer ${token}` } : {},
                        cache: 'no-store'
                    });
                    res = await response.json();
                }

                presenceUsers = Array.isArray(res.data) ? res.data : [];
                applyPresenceFiltersAndRender();

                if (subtitle) {
                    subtitle.textContent = 'Updated just now';
                    subtitle.classList.add('is-updated');
                }
            } catch (err) {
                const list = document.getElementById('peoplePresentList');
                if (list) {
                    list.innerHTML = '<div class="presence-empty">Unable to load presence right now</div>';
                }

                if (subtitle) {
                    subtitle.textContent = 'Refresh failed';
                    subtitle.classList.remove('is-updated');
                }
            } finally {
                if (refreshButton) {
                    refreshButton.disabled = false;
                    refreshButton.textContent = 'Refresh';
                }
            }
        }

        async function loadDashboard() {
            try {
                const user = await requireAuth();
                if (!user) {
                    return;
                }

                applyUserToView(user);

                const token = localStorage.getItem('token');
                const res = await fetch('/api/media?creator_id=me&page=1&limit=50', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                const container = document.getElementById('postsContainer');
                container.innerHTML = '';

                let postCount = 0;
                let likeCount = 0;
                let commentCount = 0;
                const ratings = [];

                if (Array.isArray(data.data) && data.data.length > 0) {
                    data.data.forEach((post) => {
                        postCount += 1;
                        likeCount += Number(post.likesCount || 0);
                        commentCount += Number(post.commentsCount || 0);

                        const averageRating = Number(post.ratings?.average || 0);
                        if (averageRating > 0) {
                            ratings.push(averageRating);
                        }

                        const item = document.createElement('div');
                        item.className = 'post-item';
                        item.innerHTML = `
                            ${renderPostMedia(post)}
                            <div class="post-info">
                                <strong>${escapeHtml(post.title || 'Untitled')}</strong>
                                <p style="font-size: 12px; color: #999; margin: 5px 0;">${escapeHtml((post.caption || '').substring(0, 60))}</p>
                            </div>
                        `;
                        bindHoverPreviewVideo(item.querySelector('video[data-hover-play="true"]'));

                        item.onclick = (event) => {
                            if (event.target.closest('video')) {
                                return;
                            }

                            window.location.href = `/media-detail.html?id=${post.id}`;
                        };
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = '<p class="text-muted">No posts yet. Create your first post!</p>';
                }

                document.getElementById('postCount').textContent = String(postCount);
                document.getElementById('likeCount').textContent = String(likeCount);
                document.getElementById('commentCount').textContent = String(commentCount);
                document.getElementById('avgRating').textContent = ratings.length > 0
                    ? (ratings.reduce((sum, value) => sum + value, 0) / ratings.length).toFixed(1)
                    : '0.0';
            } catch (err) {
                console.error('Dashboard error:', err);
                document.getElementById('postsContainer').innerHTML = '<p class="text-danger">Error loading posts. Please refresh the page.</p>';
            }
        }

        document.getElementById('bioText')?.addEventListener('input', (event) => {
            document.getElementById('bioCount').textContent = event.target.value.length;
        });

        document.getElementById('postCaption')?.addEventListener('input', (event) => {
            document.getElementById('captionLen').textContent = event.target.value.length;
        });

        document.getElementById('mediaFile')?.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = (loadEvent) => {
                const preview = document.getElementById('preview');
                const img = document.getElementById('imgPreview');
                const vid = document.getElementById('vidPreview');

                img.style.display = 'none';
                vid.style.display = 'none';

                if (file.type.startsWith('image/')) {
                    img.src = loadEvent.target.result;
                    img.style.display = 'block';
                } else if (file.type.startsWith('video/')) {
                    vid.src = loadEvent.target.result;
                    vid.style.display = 'block';
                }

                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('avatarInput')?.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('File size must be less than 5MB');
                event.target.value = '';
                return;
            }

            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                event.target.value = '';
                return;
            }

            try {
                const res = await uploadMyAvatar(file);
                saveUser(res.data || {});
                applyUserToView(res.data || {});
                alert('Profile picture updated successfully.');
            } catch (err) {
                console.error('Avatar upload error:', err);
                alert(err.message || 'Failed to update profile picture');
            } finally {
                event.target.value = '';
            }
        });

        document.getElementById('profileForm')?.addEventListener('submit', async (event) => {
            event.preventDefault();

            try {
                const res = await updateMyProfile({
                    displayName: document.getElementById('displayName').value.trim(),
                    bio: document.getElementById('bioText').value.trim()
                });
                saveUser(res.data || {});
                applyUserToView(res.data || {});
                alert('Profile updated successfully.');
            } catch (err) {
                console.error('Profile update error:', err);
                alert(err.message || 'Failed to save profile changes');
            }
        });

        window.uploadPost = async function uploadPost() {
            const file = document.getElementById('mediaFile').files[0];
            if (!file) {
                alert('Please select a file');
                return;
            }

            const form = new FormData();
            form.append('file', file);
            form.append('title', document.getElementById('postTitle').value || 'Untitled');
            form.append('caption', document.getElementById('postCaption').value);
            form.append('location', document.getElementById('postLocation').value);

            const uploadBtn = document.getElementById('uploadBtn');

            try {
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'Uploading...';

                const token = localStorage.getItem('token');
                const res = await fetch('/api/media', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: form
                });

                if (!res.ok) {
                    const errorPayload = await res.json().catch(() => null);
                    throw new Error(errorPayload?.error?.message || 'Upload failed');
                }

                bootstrap.Modal.getInstance(document.getElementById('uploadModal'))?.hide();
                document.getElementById('uploadForm').reset();
                document.getElementById('preview').style.display = 'none';
                document.getElementById('captionLen').textContent = '0';
                alert('Post created successfully.');
                await loadDashboard();
            } catch (err) {
                console.error('Upload error:', err);
                alert(err.message || 'Failed to upload post');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Post';
            }
        };

        loadDashboard();
        loadPeoplePresent();

        setInterval(() => {
            loadPeoplePresent();
        }, 30000);
    </script>
</body>
</html>
