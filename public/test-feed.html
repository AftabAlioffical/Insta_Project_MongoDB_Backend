<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Feed - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">InstaShare (Test)</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <h2 class="mb-4">Test Feed</h2>

                <div id="feedContainer" class="d-flex flex-column gap-4">
                    <!-- Posts will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Test data
        const posts = [
            {
                id: 1,
                title: 'Beautiful Beach Sunset',
                caption: 'Amazing sunset at the beach today!',
                url: 'https://via.placeholder.com/600x400?text=Beach+Sunset',
                location: 'Malibu Beach, CA',
                commentsCount: 8,
                ratings: { average: 5.0 }
            },
            {
                id: 2,
                title: 'Mountain Peak Adventure',
                caption: 'Reached the summit today with amazing views!',
                url: 'https://via.placeholder.com/600x400?text=Mountain+View',
                location: 'Rocky Mountains, CO',
                commentsCount: 1,
                ratings: { average: 4.5 }
            },
            {
                id: 3,
                title: 'City Lights at Night',
                caption: 'Downtown skyline never looked better',
                url: 'https://via.placeholder.com/600x400?text=City+Lights',
                location: 'New York City, NY',
                commentsCount: 1,
                ratings: { average: 4.5 }
            },
            {
                id: 4,
                title: 'Forest Hiking Trail',
                caption: 'Nature walk through the enchanted forest',
                url: 'https://via.placeholder.com/600x400?text=Forest+Trail',
                location: 'Portland, OR',
                commentsCount: 1,
                ratings: { average: 5.0 }
            }
        ];

        // Render function
        function renderTestFeed() {
            const container = document.getElementById('feedContainer');
            
            posts.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Use picsum.photos for reliable random images
                const imageUrl = `https://picsum.photos/600/400?random=${index + 1}`;
                
                card.innerHTML = `
                    <img src="${imageUrl}" class="card-img-top" alt="${item.title}" style="height: 400px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">${item.title}</h5>
                        <p class="card-text">${item.caption}</p>
                        <p class="card-text"><small class="text-muted">${item.location}</small></p>
                        <p class="card-text">
                            <small class="text-muted">
                                ${item.commentsCount || 0} comments &middot; 
                                ${item.ratings && item.ratings.average ? parseFloat(item.ratings.average).toFixed(1) : '0.0'} ★
                            </small>
                        </p>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Render when page loads
        document.addEventListener('DOMContentLoaded', renderTestFeed);
    </script>

    <!-- Footer -->
    <footer class="bg-dark text-light mt-5">
        <!-- Footer Navbar -->
        <nav class="navbar navbar-dark bg-black py-3">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">InstaShare</span>
                <div class="d-flex gap-3">
                    <a href="test-feed.html" class="text-light text-decoration-none">Home</a>
                    <a href="#" class="text-light text-decoration-none">About</a>
                    <a href="#" class="text-light text-decoration-none">Terms</a>
                    <a href="#" class="text-light text-decoration-none">Privacy</a>
                    <a href="#" class="text-light text-decoration-none">Contact</a>
                </div>
            </div>
        </nav>

        <!-- Footer Content -->
        <div class="container py-4">
            <div class="row">
                <!-- Brand Section -->
                <div class="col-md-4 mb-4">
                    <h5>About InstaShare</h5>
                    <p class="text-muted">Share your moments with the world. A scalable social media platform for creators and consumers.</p>
                </div>

                <!-- Quick Links -->
                <div class="col-md-4 mb-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="test-feed.html" class="text-light text-decoration-none">Feed</a></li>
                        <li><a href="#" class="text-light text-decoration-none">Explore</a></li>
                    </ul>
                </div>

                <!-- Social Links -->
                <div class="col-md-4 mb-4">
                    <h5>Follow Us</h5>
                    <div class="d-flex gap-3">
                        <a href="https://facebook.com" target="_blank" class="text-light text-decoration-none fs-5">
                            <i class="bi bi-facebook">f</i> Facebook
                        </a>
                        <a href="https://twitter.com" target="_blank" class="text-light text-decoration-none fs-5">
                            <i class="bi bi-twitter">𝕏</i> Twitter
                        </a>
                        <a href="https://instagram.com" target="_blank" class="text-light text-decoration-none fs-5">
                            <i class="bi bi-instagram">📷</i>
                        </a>
                    </div>
                </div>
            </div>

            <hr class="bg-secondary">

            <!-- Copyright -->
            <div class="text-center">
                <p class="text-muted mb-0">&copy; 2026 InstaShare. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
