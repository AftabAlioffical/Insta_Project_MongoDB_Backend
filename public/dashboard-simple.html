<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background-color: #f5f5f5; }
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .profile-avatar:hover {
            opacity: 0.8;
        }
        .stat-card {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #667eea;
            font-weight: bold;
            margin: 10px 0 0;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .post-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .post-item:hover { transform: translateY(-5px); }
        .post-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .post-info {
            padding: 12px;
        }
        .settings-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="instagram-navbar">
        <div class="container-fluid d-flex align-items-center justify-content-between" style="padding: 0 20px;">
            <a href="consumer-feed.html" style="text-decoration: none; color: inherit; margin: 0;"><strong>InstaShare</strong></a>
            <div class="navbar-right">
                <a href="consumer-feed.html" class="nav-icon" title="Home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                </a>
                <a href="dashboard-simple.html" class="nav-icon" title="Dashboard">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </a>
                <div class="dropdown">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Profile" class="user-avatar" id="profileDropdown" data-bs-toggle="dropdown">
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="dashboard-simple.html">My Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-3 text-center mb-4 mb-md-0">
                        <img id="userAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Avatar" class="profile-avatar" onclick="document.getElementById('avatarInput').click()" title="Click to change avatar">
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </div>
                    <div class="col-md-9">
                        <h1 id="userName">Loading...</h1>
                        <p id="userEmail" class="fs-5">Loading...</p>
                        <p id="userBio">Welcome to InstaShare!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="row mb-5">
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-images" style="font-size: 24px;"></i>
                    <p>Posts</p>
                    <h3 id="postCount">0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-heart" style="font-size: 24px;"></i>
                    <p>Likes</p>
                    <h3 id="likeCount">0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-chat" style="font-size: 24px;"></i>
                    <p>Comments</p>
                    <h3 id="commentCount">0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card">
                    <i class="bi bi-star" style="font-size: 24px;"></i>
                    <p>Rating</p>
                    <h3 id="avgRating">0.0</h3>
                </div>
            </div>
        </div>

        <!-- Posts Section -->
        <div class="mb-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Your Posts</h3>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    <i class="bi bi-plus"></i> New Post
                </button>
            </div>
            <div id="postsContainer" class="posts-grid">
                <p class="text-muted">Loading posts...</p>
            </div>
        </div>

        <!-- Settings Section -->
        <div class="settings-section">
            <h3>Profile Settings</h3>
            <form id="profileForm">
                <div class="mb-3">
                    <label class="form-label">Display Name</label>
                    <input type="text" class="form-control" id="displayName" placeholder="Your name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <textarea class="form-control" id="bioText" rows="3" maxlength="500"></textarea>
                    <small><span id="bioCount">0</span>/500</small>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <div id="preview" style="display:none; margin-bottom: 15px;">
                                <img id="imgPreview" style="max-width: 100%; max-height: 300px; border-radius: 8px; display: none;">
                                <video id="vidPreview" style="max-width: 100%; max-height: 300px; border-radius: 8px; display: none;" controls></video>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Photo or Video</label>
                            <input type="file" class="form-control" id="mediaFile" accept="image/*,video/*" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="postTitle" placeholder="Post title" maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Caption</label>
                            <textarea class="form-control" id="postCaption" placeholder="Write a caption..." rows="3" maxlength="2000"></textarea>
                            <small><span id="captionLen">0</span>/2000</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location (Optional)</label>
                            <input type="text" class="form-control" id="postLocation" placeholder="Where was this taken?">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="uploadBtn" onclick="uploadPost()">Post</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { logout } from './assets/js/auth.js';
        window.logout = logout;

        // Load profile data
        async function loadDashboard() {
            try {
                const token = localStorage.getItem('token');
                const user = JSON.parse(localStorage.getItem('user') || '{}');

                if (!token) {
                    window.location.href = 'index.html';
                    return;
                }

                // Display user info
                document.getElementById('userName').textContent = user.displayName || user.email?.split('@')[0] || 'User';
                document.getElementById('userEmail').textContent = user.email || '';
                document.getElementById('userBio').textContent = user.bio || 'Welcome to InstaShare!';

                if (user.avatar) {
                    document.getElementById('userAvatar').src = user.avatar;
                }

                // Load posts
                const res = await fetch('/media?page=1&limit=50', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                const container = document.getElementById('postsContainer');
                container.innerHTML = '';

                let postCount = 0, likeCount = 0, commentCount = 0, ratings = [];

                if (data.data && data.data.length > 0) {
                    data.data.forEach(post => {
                        postCount++;
                        likeCount += post.likes_count || 0;
                        commentCount += post.comments_count || 0;
                        if (post.rating) ratings.push(post.rating);

                        const item = document.createElement('div');
                        item.className = 'post-item';
                        item.innerHTML = `
                            <img src="${post.url || 'https://picsum.photos/200/200?random=' + post.id}" onerror="this.src='https://picsum.photos/200/200?random=${post.id}'">
                            <div class="post-info">
                                <strong>${post.title || 'Untitled'}</strong>
                                <p style="font-size: 12px; color: #999; margin: 5px 0;">${(post.caption || '').substring(0, 40)}</p>
                            </div>
                        `;
                        item.onclick = () => window.location.href = `/media-detail.html?id=${post.id}`;
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = '<p class="text-muted">No posts yet. Create your first post!</p>';
                }

                document.getElementById('postCount').textContent = postCount;
                document.getElementById('likeCount').textContent = likeCount;
                document.getElementById('commentCount').textContent = commentCount;
                document.getElementById('avgRating').textContent = ratings.length > 0 ? (ratings.reduce((a,b)=>a+b)/ratings.length).toFixed(1) : '0.0';

                // Populate form fields
                document.getElementById('displayName').value = user.displayName || '';
                document.getElementById('bioText').value = user.bio || '';

            } catch (err) {
                console.error('Dashboard error:', err);
                alert('Error loading dashboard');
            }
        }

        // Form event listeners
        document.getElementById('bioText').addEventListener('input', (e) => {
            document.getElementById('bioCount').textContent = e.target.value.length;
        });

        document.getElementById('postCaption').addEventListener('input', (e) => {
            document.getElementById('captionLen').textContent = e.target.value.length;
        });

        document.getElementById('mediaFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (evt) => {
                const preview = document.getElementById('preview');
                const img = document.getElementById('imgPreview');
                const vid = document.getElementById('vidPreview');

                img.style.display = 'none';
                vid.style.display = 'none';

                if (file.type.startsWith('image/')) {
                    img.src = evt.target.result;
                    img.style.display = 'block';
                } else if (file.type.startsWith('video/')) {
                    vid.src = evt.target.result;
                    vid.style.display = 'block';
                }
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        // Avatar upload handler
        document.getElementById('avatarInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Validate file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('File size must be less than 5MB');
                return;
            }

            // Validate file type
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (evt) => {
                const avatarData = evt.target.result;
                
                // Save to localStorage
                const user = JSON.parse(localStorage.getItem('user'));
                user.avatar = avatarData;
                localStorage.setItem('user', JSON.stringify(user));
                
                // Update avatar display
                document.getElementById('userAvatar').src = avatarData;
                alert('Profile picture updated!');
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('user'));
            user.displayName = document.getElementById('displayName').value;
            user.bio = document.getElementById('bioText').value;
            localStorage.setItem('user', JSON.stringify(user));

            alert('Profile updated!');
            loadDashboard();
        });

        // Upload post
        window.uploadPost = async function() {
            const file = document.getElementById('mediaFile').files[0];
            if (!file) {
                alert('Please select a file');
                return;
            }

            const form = new FormData();
            form.append('file', file);
            form.append('title', document.getElementById('postTitle').value || 'Untitled');
            form.append('caption', document.getElementById('postCaption').value);
            form.append('location', document.getElementById('postLocation').value);

            try {
                const uploadBtn = document.getElementById('uploadBtn');
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'Uploading...';

                const token = localStorage.getItem('token');
                const res = await fetch('/media', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: form
                });

                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
                    document.getElementById('uploadForm').reset();
                    document.getElementById('mediaFile').value = '';
                    document.getElementById('preview').style.display = 'none';
                    alert('Post created successfully!');
                    await loadDashboard();
                } else {
                    alert('Upload failed: ' + (await res.text()));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                const uploadBtn = document.getElementById('uploadBtn');
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Post';
            }
        };

        // Load on page load
        loadDashboard();
    </script>
</body>
</html>
