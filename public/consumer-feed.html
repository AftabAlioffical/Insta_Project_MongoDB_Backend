<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Instagram-like Navbar -->
    <nav class="instagram-navbar">
        <div class="container-fluid d-flex align-items-center justify-content-between" style="padding: 0 20px;">
            <!-- Logo -->
            <div class="navbar-brand" style="margin: 0; min-width: 150px;">
                <a href="consumer-feed.html" style="text-decoration: none; color: inherit;">InstaShare</a>
            </div>

            <!-- Center Search (hidden on mobile) -->
            <div class="navbar-center d-none d-md-flex">
                <div class="search-wrapper">
                    <div class="search-icon">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="6.5" cy="6.5" r="5.5"></circle>
                            <path d="m10 10 4 4"></path>
                        </svg>
                        <input type="text" placeholder="Search accounts..." id="globalSearch" autocomplete="off">
                    </div>
                    <div id="searchSuggestions" class="search-suggestions"></div>
                </div>
            </div>

            <!-- Right Navigation Icons -->
            <div class="navbar-right">
                <!-- Home -->
                <a href="consumer-feed.html" class="nav-icon" title="Home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>

                <!-- Explore -->
                <a href="search.html" class="nav-icon" title="Explore">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                </a>

                <!-- Profile Avatar → Dashboard -->
                <a href="dashboard.html" class="nav-icon" title="My Dashboard" style="padding: 0;">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Profile" class="user-avatar" id="profileDropdown" style="cursor: pointer;">
                </a>

                <!-- Admin Panel (admin only) -->
                <a href="admin-dashboard.html" id="adminMenuLink" class="nav-icon" title="Admin Panel" style="display: none; color: #e74c3c;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                    </svg>
                </a>

                <!-- Logout -->
                <button class="nav-icon" title="Logout" onclick="logout()" style="border: none; background: none; cursor: pointer;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div id="feedContainer" class="feed-container">
        <div class="text-center mt-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <nav aria-label="Page navigation" class="mt-5">
        <ul class="pagination justify-content-center" id="pagination">
        </ul>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/feed.js"></script>
    <script>
        function checkRoleFeatures() {
            const user = localStorage.getItem('user');
            if (!user) {
                return;
            }

            try {
                const userData = JSON.parse(user);
                const role = (userData.role || '').toUpperCase();

                const adminLink = document.getElementById('adminMenuLink');
                if (adminLink) {
                    adminLink.style.display = role === 'ADMIN' ? 'block' : 'none';
                }
            } catch (_) {
                // Ignore malformed localStorage user payload.
            }
        }

        window.addEventListener('load', checkRoleFeatures);
    </script>
</body>
</html>
