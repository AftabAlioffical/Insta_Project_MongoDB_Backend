<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            overflow-x: hidden;
        }

        .search-page-wrapper {
            width: 100%;
        }

        .search-page-wrapper .search-suggestions {
            top: calc(100% + 8px);
        }

        .search-hint-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .search-hint-chip {
            font-size: 12px;
            color: #4b5563;
            background: #f3f4f6;
            border-radius: 999px;
            padding: 4px 10px;
        }

        .search-shell {
            padding-left: 16px;
            padding-right: 16px;
        }

        @media (max-width: 768px) {
            .search-shell {
                margin-top: 2rem !important;
                margin-bottom: 2rem !important;
                padding-left: 14px;
                padding-right: 14px;
            }

            .search-hint-row {
                gap: 6px;
            }

            .search-hint-chip {
                font-size: 11px;
                padding: 4px 8px;
            }
        }

        @media (max-width: 576px) {
            .search-shell {
                padding-left: 12px;
                padding-right: 12px;
            }

            .search-page-wrapper .search-suggestions {
                max-height: 260px;
            }

            .card-body {
                padding: 1rem;
            }

            .pagination {
                flex-wrap: wrap;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="consumer-feed.html">InstaShare</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="consumer-feed.html">Feed</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="search.html">Search</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 search-shell">
        <div class="row">
            <div class="col-md-10 mx-auto">
                <h2 class="mb-4">Search</h2>

                <div class="card mb-4">
                    <div class="card-body">
                        <form id="searchForm">
                            <div class="row g-3">
                                <div class="col-md-12">
                                    <div class="search-wrapper search-page-wrapper">
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            id="searchQuery"
                                            placeholder="Try #travel, @ali, id:21, loc:dubai, tag:john"
                                            autocomplete="off"
                                        >
                                        <div id="searchSuggestions" class="search-suggestions"></div>
                                    </div>
                                    <div class="search-hint-row">
                                        <span class="search-hint-chip">#hashtag</span>
                                        <span class="search-hint-chip">@username</span>
                                        <span class="search-hint-chip">id:123</span>
                                        <span class="search-hint-chip">loc:city</span>
                                        <span class="search-hint-chip">tag:person</span>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary mt-3 w-100">Search</button>
                        </form>
                    </div>
                </div>

                <div id="searchResults" class="d-flex flex-column gap-4">
                    <p class="text-muted text-center">Use one input for all: #hashtag, @username, id:123, loc:city, tag:person</p>
                </div>

                <nav aria-label="Page navigation" class="mt-5">
                    <ul class="pagination justify-content-center" id="pagination">
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Comment Modal -->
    <div class="modal fade" id="commentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Comment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="commentForm">
                        <input type="hidden" id="commentMediaId" value="">
                        <div class="mb-3">
                            <label for="commentText" class="form-label">Your Comment</label>
                            <textarea 
                                class="form-control" 
                                id="commentText" 
                                rows="3"
                            ></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="submitComment">Post Comment</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Rating Modal -->
    <div class="modal fade" id="ratingModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Rate Media</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="ratingMediaId" value="">
                    <div class="text-center">
                        <div id="starRating" class="mb-3">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <p id="ratingStatus" class="text-muted">Click to rate</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="submitRating">Submit Rating</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    <script type="module" src="assets/js/search.js"></script>
</body>
</html>
