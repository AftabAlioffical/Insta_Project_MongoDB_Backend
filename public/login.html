<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        @media (max-width: 576px) {
            .login-card-copy {
                font-size: 13px;
                line-height: 1.6;
            }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center auth-shell">
        <div class="card shadow auth-card">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">InstaShare</h2>
                <p class="text-center text-muted mb-4">Share your moments with the world</p>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email"
                            placeholder="you@example.com"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div id="alertContainer"></div>

                    <button 
                        type="submit" 
                        class="btn btn-primary w-100 mb-3"
                        id="loginBtn"
                    >
                        Login
                    </button>

                    <a href="signup.html" class="btn btn-outline-primary w-100 mb-3" id="goToSignupBtn">
                        Sign Up
                    </a>
                </form>

                <hr>
                <p class="text-center text-muted small mb-0 login-card-copy">
                    Demo Credentials:<br>
                    <strong>Admin:</strong> admin@insta.local / admin123<br>
                    <strong>Creator:</strong> creator1@insta.local / creator123<br>
                    <strong>Consumer:</strong> consumer1@insta.local / consumer123
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    <script type="module" src="assets/js/footer.js"></script>
</body>
</html>
