<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - InstaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">InstaShare</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <h2 class="mb-4">Feed</h2>
                <div id="status" class="alert alert-info">Loading feed...</div>
                <div id="feedContainer" class="d-flex flex-column gap-4">
                    <!-- Posts will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light mt-5">
        <!-- Footer Navbar -->
        <nav class="navbar navbar-dark bg-black py-3">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">InstaShare</span>
                <div class="d-flex gap-3">
                    <a href="feed.html" class="text-light text-decoration-none">Home</a>
                    <a href="#" class="text-light text-decoration-none">About</a>
                    <a href="#" class="text-light text-decoration-none">Terms</a>
                    <a href="#" class="text-light text-decoration-none">Privacy</a>
                    <a href="#" class="text-light text-decoration-none">Contact</a>
                </div>
            </div>
        </nav>

        <!-- Footer Content -->
        <div class="container py-4">
            <div class="row">
                <!-- Brand Section -->
                <div class="col-md-4 mb-4">
                    <h5>About InstaShare</h5>
                    <p class="text-muted">Share your moments with the world. A scalable social media platform for creators and consumers.</p>
                </div>

                <!-- Quick Links -->
                <div class="col-md-4 mb-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="feed.html" class="text-light text-decoration-none">Feed</a></li>
                        <li><a href="#" class="text-light text-decoration-none">Explore</a></li>
                    </ul>
                </div>

                <!-- Social Links -->
                <div class="col-md-4 mb-4">
                    <h5>Follow Us</h5>
                    <div class="d-flex gap-3">
                        <a href="https://facebook.com" target="_blank" class="text-light text-decoration-none fs-5">
                            <i class="bi bi-facebook">f</i> Facebook
                        </a>
                        <a href="https://twitter.com" target="_blank" class="text-light text-decoration-none fs-5">
                            <i class="bi bi-twitter">𝕏</i> Twitter
                        </a>
                        <a href="https://instagram.com" target="_blank" class="text-light text-decoration-none fs-5">
                            <i class="bi bi-instagram">📷</i>
                        </a>
                    </div>
                </div>
            </div>

            <hr class="bg-secondary">

            <!-- Copyright -->
            <div class="text-center">
                <p class="text-muted mb-0">&copy; 2026 InstaShare. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadFeed() {
            try {
                const response = await fetch('/api/media?page=1');
                const data = await response.json();
                
                const status = document.getElementById('status');
                const container = document.getElementById('feedContainer');
                
                if (!data.success || !data.data || data.data.length === 0) {
                    status.innerHTML = '<div class="alert alert-warning">No posts available</div>';
                    return;
                }
                
                status.style.display = 'none';
                
                data.data.forEach((post, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Use different image service - picsum.photos is very reliable
                    const imageUrl = `https://picsum.photos/600/400?random=${post.id || index}`;
                    
                    card.innerHTML = `
                        <div class="position-relative" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 400px; display: flex; align-items: center; justify-content: center; color: white;">
                            <img src="${imageUrl}" class="card-img-top" alt="${post.title}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'">
                            <div style="position: absolute; text-align: center; display: ${imageUrl ? 'none' : 'block'};">
                                <div style="font-size: 48px;">📸</div>
                                <p>${post.title}</p>
                            </div>
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${post.title}</h5>
                            <p class="card-text">${post.caption || 'No caption'}</p>
                            <p class="card-text"><small class="text-muted">${post.location || 'No location'}</small></p>
                            <p class="card-text">
                                <small class="text-muted">
                                    ${post.commentsCount || 0} comments &middot; 
                                    ${post.ratings?.average ? parseFloat(post.ratings.average).toFixed(1) : '0.0'} ★
                                </small>
                            </p>
                        </div>
                    `;
                    container.appendChild(card);
                });
                
            } catch (err) {
                const status = document.getElementById('status');
                status.innerHTML = '<div class="alert alert-danger">Error loading feed: ' + err.message + '</div>';
                console.error('Feed error:', err);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadFeed);
    </script>
</body>
</html>
