services:
  php:
    build: .
    expose:
      - "80"
    volumes:
      - .:/var/www/html:cached
      - ./config/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-insta_app}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_KEY=${S3_KEY:-minioadmin}
      - S3_SECRET=${S3_SECRET:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-insta-media}
      - S3_REGION=${S3_REGION:-us-east-1}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google-callback}
    depends_on:
      - mongodb
      - redis
      - minio

  frontend:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mongodb:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mongodb_data:
  redis_data:
  minio_data:
